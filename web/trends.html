<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>키워드 검색 추이 (증감)</title>
<style>
  :root{--bg:#f6f7f9;--panel:#fff;--line:#e8ebef;--text:#1a1d21;--muted:#7c828b;
    --up:#e5484d;--down:#2f6bff;--naver:#03c75a;--yt:#ff0000;--radius:14px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
  .wrap{max-width:1120px;margin:0 auto;padding:26px 20px 70px}
  h1{font-size:22px;margin:0 0 4px;letter-spacing:-.5px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  input#q{flex:1;min-width:180px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  select,.seg button{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;cursor:pointer}
  .seg{display:flex;gap:6px}
  .seg button.active{background:#111418;color:#fff;border-color:#111418}
  .pill{font-size:12px;padding:5px 11px;border-radius:999px;background:#eef0f3;color:#5b616a}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #f1f3f5;font-size:13.5px;vertical-align:middle}
  th{background:#f4f6f8;color:#495059;font-weight:700;font-size:12.5px;cursor:pointer;user-select:none}
  tr:last-child td{border-bottom:none}
  .rank{color:var(--muted);width:26px;text-align:center}
  .kw{font-weight:700}
  .cat{color:var(--muted);font-size:11.5px;margin-top:2px}
  .val{font-variant-numeric:tabular-nums;font-weight:700}
  .chg{font-weight:700;font-variant-numeric:tabular-nums}
  .chg.up{color:var(--up)} .chg.down{color:var(--down)} .chg.na{color:#c7ccd2}
  .spark{display:block}
  .legend{display:flex;gap:14px;align-items:center;color:var(--muted);font-size:12px;margin:2px 0 14px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .empty{color:#c7ccd2}
  .foot{color:var(--muted);font-size:12px;margin-top:16px;text-align:center}
  @media(max-width:640px){.hide-sm{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <h1>키워드 검색 추이 · 증감</h1>
  <div class="sub" id="meta">데이터 로딩…</div>

  <div class="bar">
    <span class="pill">소스</span>
    <div class="seg" id="srcSeg">
      <button data-s="naver" class="active">네이버(월별)</button>
      <button data-s="pinterest">핀터레스트(KR·주별)</button>
      <button data-s="youtube">유튜브(주별)</button>
    </div>
    <span class="pill" id="srcState"></span>
  </div>

  <div class="legend">
    <span id="srcDesc"></span>
  </div>

  <div class="bar">
    <input id="q" placeholder="키워드 검색…" />
    <div class="seg" id="sortSeg">
      <button data-k="yoy" class="active">YoY순</button>
      <button data-k="mom">단기변화순</button>
      <button data-k="latest">최신값순</button>
      <button data-k="name">이름순</button>
    </div>
    <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="onlyData"/> 데이터 있는 것만</label>
  </div>

  <table id="tbl">
    <thead>
      <tr>
        <th class="rank">#</th>
        <th>키워드</th>
        <th class="hide-sm">추이(최근 3년)</th>
        <th>최신</th>
        <th id="thShort">MoM</th>
        <th>YoY</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="foot" id="foot"></div>
</div>

<script src="trends.js"></script>
<script>
(function(){
  var D = window.TREND_DATA;
  if(!D || !D.index){ document.getElementById('meta').textContent='아직 수집된 추이 데이터가 없습니다. scraper/trends.js 를 실행하세요.'; return; }
  var series = D.series || {};
  var list = D.index.keywords.slice();
  document.getElementById('meta').textContent =
    '수집: ' + (D.index.updatedAt||'').replace('T',' ').slice(0,16) + ' · 추적 ' + list.length + '개 키워드';

  var SRC = {
    naver:     { color:'#03c75a', unit:'월별', short:'MoM', desc:'네이버 데이터랩 쇼핑 검색추이 · 상대지수(0~100), 월별 '+(D.index.months||36)+'개월' },
    pinterest: { color:'#e60023', unit:'주별', short:'WoW', desc:'핀터레스트 트렌드('+(D.index.pinterestCountry||'KR')+') · 주별. 한국은 커버리지가 희박해 일부 키워드만 데이터가 있습니다' },
    youtube:   { color:'#ff0000', unit:'주별', short:'WoW', desc:'구글 트렌드(유튜브 검색) · 주별. 데이터센터 IP 차단 시 사용자 PC에서 실행해야 채워집니다' },
  };
  var source='naver', sortKey='yoy', q='', onlyData=false;

  function sparkline(points, color){
    if(!points || points.length<2) return '<span class="empty">—</span>';
    var w=150,h=34,pad=3;
    var vals=points.map(function(p){return p.value;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    var rng=(mx-mn)||1;
    var step=(w-2*pad)/(points.length-1);
    var d=points.map(function(p,i){
      var x=pad+i*step, y=h-pad-((p.value-mn)/rng)*(h-2*pad);
      return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
    }).join(' ');
    var last=points[points.length-1];
    var lx=pad+(points.length-1)*step, ly=h-pad-((last.value-mn)/rng)*(h-2*pad);
    return '<svg class="spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+
      '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.6"/>'+
      '<circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2.4" fill="'+color+'"/></svg>';
  }
  function chg(v){
    if(v===null||v===undefined) return '<span class="chg na">—</span>';
    var c=v>0?'up':(v<0?'down':'na'); var a=v>0?'▲':(v<0?'▼':'–');
    return '<span class="chg '+c+'">'+a+' '+Math.abs(v).toFixed(1)+'%</span>';
  }
  // 선택 소스의 시계열/요약 추출
  function srcData(kw){
    var s=series[kw]||{}; var d=s[source]||{};
    var avail = source==='naver' ? !(d.empty) && (d.points&&d.points.length) : d.available;
    return {
      points: d.points||[],
      latest: (avail? d.latest : null),
      shortPct: (avail? d.momPct : null),   // naver=MoM, pin/yt=WoW(직전 포인트 대비)
      yoyPct: (avail? d.yoyPct : null),
      label: source==='naver' ? (d.category||'') : (d.country||''),
      avail: !!avail,
    };
  }
  function render(){
    var meta=SRC[source];
    document.getElementById('thShort').textContent=meta.short;
    document.getElementById('srcDesc').innerHTML='<span class="dot" style="background:'+meta.color+'"></span>'+meta.desc;
    var st = source==='naver' ? '' :
      (source==='pinterest' ? ((D.index.pinterestAvailableCount||0)+'개 키워드 데이터有') :
       (D.index.youtubeAvailable? '유튜브 수집됨' : '유튜브 미수집(사용자 PC 실행 필요)'));
    document.getElementById('srcState').textContent=st;

    var arr=list.map(function(x){ return {kw:x.keyword, d:srcData(x.keyword)}; })
      .filter(function(r){ return !q || r.kw.toLowerCase().indexOf(q)>=0; })
      .filter(function(r){ return !onlyData || r.d.avail; });
    if(sortKey==='name') arr.sort(function(a,b){return a.kw.localeCompare(b.kw,'ko');});
    else arr.sort(function(a,b){
      var va=a.d[sortKey==='yoy'?'yoyPct':sortKey==='mom'?'shortPct':'latest'];
      var vb=b.d[sortKey==='yoy'?'yoyPct':sortKey==='mom'?'shortPct':'latest'];
      return (vb==null?-1e12:vb)-(va==null?-1e12:va);
    });
    var rows=arr.map(function(r,i){
      var d=r.d;
      var sub = d.label ? '<div class="cat">'+esc(d.label)+'</div>' : (d.avail?'':'<div class="cat empty">데이터 없음</div>');
      return '<tr>'+
        '<td class="rank">'+(i+1)+'</td>'+
        '<td><span class="kw">'+esc(r.kw)+'</span>'+sub+'</td>'+
        '<td class="hide-sm">'+sparkline(d.points,meta.color)+'</td>'+
        '<td class="val">'+(d.latest==null?'<span class="empty">—</span>':d.latest)+'</td>'+
        '<td>'+chg(d.shortPct)+'</td>'+
        '<td>'+chg(d.yoyPct)+'</td>'+
      '</tr>';
    }).join('');
    document.getElementById('rows').innerHTML = rows || '<tr><td colspan="6" class="empty" style="text-align:center;padding:26px">결과 없음</td></tr>';
    document.getElementById('foot').textContent = arr.length+'개 표시 · 값은 각 키워드별 상대지수(자체 최대=100 기준), 증감은 방향 지표로 해석';
  }
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);});}

  document.getElementById('q').addEventListener('input',function(e){q=e.target.value.trim().toLowerCase();render();});
  document.getElementById('onlyData').addEventListener('change',function(e){onlyData=e.target.checked;render();});
  document.getElementById('sortSeg').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    [].forEach.call(this.children,function(c){c.classList.remove('active');});
    b.classList.add('active'); sortKey=b.dataset.k; render();
  });
  document.getElementById('srcSeg').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    [].forEach.call(this.children,function(c){c.classList.remove('active');});
    b.classList.add('active'); source=b.dataset.s; render();
  });
  render();
})();
</script>
</body>
</html>
